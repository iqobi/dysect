<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DYSECT - Vacuum The Darkness</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }

    #blocker {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.92);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; cursor: pointer;
      font-family: 'Courier New', monospace;
    }

    #blocker h1 {
      font-size: 72px; color: #4a9; letter-spacing: 12px;
      text-shadow: 0 0 40px rgba(68,170,153,0.6), 0 0 80px rgba(68,170,153,0.3);
      margin-bottom: 20px; animation: flicker 3s infinite;
    }

    #blocker h2 {
      font-size: 18px; color: #666; letter-spacing: 4px;
      margin-bottom: 40px;
    }

    #blocker p {
      font-size: 14px; color: #555; letter-spacing: 2px;
      animation: pulse 2s ease-in-out infinite;
    }

    #blocker .controls {
      margin-top: 30px; color: #444; font-size: 12px;
      line-height: 2; text-align: center;
    }

    @keyframes flicker {
      0%, 100% { opacity: 1; }
      92% { opacity: 1; }
      93% { opacity: 0.3; }
      94% { opacity: 1; }
      96% { opacity: 0.5; }
      97% { opacity: 1; }
    }

    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      pointer-events: none; z-index: 50;
      font-family: 'Courier New', monospace;
      padding: 20px;
    }

    #hud-score {
      color: #4a9; font-size: 24px; letter-spacing: 3px;
      text-shadow: 0 0 10px rgba(68,170,153,0.5);
    }

    #hud-insects {
      color: #a64; font-size: 14px; letter-spacing: 2px;
      margin-top: 5px;
    }

    #hud-vacuum {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      width: 300px; height: 6px;
      background: rgba(255,255,255,0.05); border-radius: 3px;
      pointer-events: none; z-index: 50;
    }

    #hud-vacuum-fill {
      height: 100%; width: 100%; border-radius: 3px;
      background: linear-gradient(90deg, #4a9, #6cb);
      transition: width 0.3s;
    }

    #hud-vacuum-label {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      color: #4a9; font-size: 11px; letter-spacing: 3px;
      font-family: 'Courier New', monospace;
      pointer-events: none; z-index: 50; opacity: 0.6;
    }

    #crosshair {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none; z-index: 50;
    }

    #crosshair::before, #crosshair::after {
      content: ''; position: absolute;
      background: rgba(68,170,153,0.4);
    }

    #crosshair::before {
      width: 20px; height: 2px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    #crosshair::after {
      width: 2px; height: 20px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    #message {
      position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
      color: #4a9; font-family: 'Courier New', monospace;
      font-size: 16px; letter-spacing: 2px;
      pointer-events: none; z-index: 50;
      opacity: 0; transition: opacity 0.5s;
      text-shadow: 0 0 10px rgba(68,170,153,0.5);
    }
  </style>
</head>
<body>
  <div id="blocker">
    <h1>DYSECT</h1>
    <h2>VACUUM THE DARKNESS</h2>
    <p>CLICK TO BEGIN</p>
    <div class="controls">
      WASD - MOVE &nbsp;|&nbsp; MOUSE - LOOK<br>
      LEFT CLICK - VACUUM &nbsp;|&nbsp; F - FLASHLIGHT &nbsp;|&nbsp; E - INTERACT
    </div>
  </div>

  <div id="hud" style="display:none;">
    <div id="hud-score">0</div>
    <div id="hud-insects">INSECTS REMAINING: --</div>
  </div>

  <div id="crosshair" style="display:none;"></div>
  <div id="hud-vacuum-label" style="display:none;">VACUUM POWER</div>
  <div id="hud-vacuum" style="display:none;">
    <div id="hud-vacuum-fill"></div>
  </div>
  <div id="message"></div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
